name: Selenium CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  run-selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Selenium smoke tests
        run: mvn clean test "-Dbrowser=chrome" "-DsuiteXmlFile=testng-smoke.xml"

      - name: Upload test artifacts when failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-test-artifacts
          path: |
            target/